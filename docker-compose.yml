services:
  postgres:
    image: postgres:17-alpine
    container_name: scattermerge_postgres
    environment:
      POSTGRES_DB: scattermerge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
